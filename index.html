<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tasty Cauldron | Under Construction</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Spectral+SC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Spectral SC', serif;
      background: radial-gradient(circle at bottom, #1a0f1f, #0a0610);
      color: #f3e9dc;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* ✨ Starfield background */
    .stars {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      z-index: 1;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: #fff;
      opacity: 0.8;
      border-radius: 50%;
      animation: twinkle 3s infinite ease-in-out;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    /* ✨ Main container */
    .container {
      text-align: center;
      padding: 2rem;
      border: 2px solid #a291a5;
      border-radius: 20px;
      background: rgba(20, 12, 25, 0.85);
      box-shadow: 0 0 25px rgba(180, 150, 255, 0.25);
      max-width: 600px;
      z-index: 2;
      position: relative;
    }

    h1 {
      font-family: 'Cinzel Decorative', cursive;
      font-size: 2.5rem;
      color: #b9a3e3;
      margin-bottom: 1rem;
    }

    p {
      font-size: 1.2rem;
      color: #d6c7f1;
      margin-bottom: 0.5rem;
    }

    .year {
      font-size: 1.4rem;
      color: #c3b0e0;
      font-weight: bold;
      letter-spacing: 1px;
      margin-top: 0.5rem;
      text-shadow: 0 0 10px rgba(200, 180, 255, 0.4);
    }

    .moon {
      font-size: 3rem;
      margin-bottom: 1rem;
      animation: pulse 2s infinite alternate;
    }

    @keyframes pulse {
      from { opacity: 0.7; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1.05); }
    }

    .footer {
      margin-top: 2rem;
      font-size: 0.9rem;
      color: #8c7fa8;
    }
  </style>
</head>
<body>
  <!-- ✨ Star background -->
  <div class="stars" id="stars"></div>

  <div class="container">
    <div class="moon">🌙</div>
    <h1>Tasty Cauldron is Brewing Something New</h1>
    <p>Our cauldron bubbles with fresh magic...<br> We’ll be back soon with a brand new look!</p>
    <div class="year">Returning in 2026</div>
    <div class="footer">✨ Thank you for your patience ✨</div>
  </div>

  <script>
    // 🌟 Generate random twinkling stars
    const starContainer = document.getElementById('stars');
    const numStars = 80; // adjust number of stars

    for (let i = 0; i < numStars; i++) {
      const star = document.createElement('div');
      star.classList.add('star');
      star.style.top = Math.random() * 100 + '%';
      star.style.left = Math.random() * 100 + '%';
      star.style.animationDuration = (2 + Math.random() * 3) + 's';
      star.style.animationDelay = (Math.random() * 5) + 's';
      starContainer.appendChild(star);
    }
  </script>
</body>
</html>
